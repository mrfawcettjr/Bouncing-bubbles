<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bouncing Bubbles</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: radial-gradient(circle at top, #1b2735 0, #090a0f 55%);
      --bubble-1: #4dd0e1;
      --bubble-2: #ffca28;
      --bubble-3: #ff7043;
      --bubble-4: #ab47bc;
      --bubble-5: #66bb6a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
      color: #f5f5f5;
      overflow: hidden;
    }

    .app-shell {
      width: min(960px, 100vw);
      height: min(600px, 100vh);
      max-height: calc(100vh - 64px);
      border-radius: 24px;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.08), rgba(0, 0, 0, 0.4));
      box-shadow:
        0 24px 80px rgba(0, 0, 0, 0.7),
        0 0 0 1px rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      padding: 20px 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .app-title-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .app-title {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.9);
    }

    .app-subtitle {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.65);
    }

    .legend {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.7);
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
    }

    .legend-dot:nth-child(1) { background: var(--bubble-1); }
    .legend-dot:nth-child(2) { background: var(--bubble-2); }
    .legend-dot:nth-child(3) { background: var(--bubble-3); }
    .legend-dot:nth-child(4) { background: var(--bubble-4); }
    .legend-dot:nth-child(5) { background: var(--bubble-5); }

    .canvas-wrapper {
      position: relative;
      flex: 1;
      border-radius: 18px;
      overflow: hidden;
      background: radial-gradient(circle at top left, #141b2d, #050509 70%);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.5);
      gap: 8px;
    }

    .pill {
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(0, 0, 0, 0.3);
    }

    .pill-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #4caf50;
      box-shadow: 0 0 8px rgba(76, 175, 80, 0.7);
    }

    @media (max-width: 768px) {
      .app-shell {
        width: 100vw;
        height: 100vh;
        max-height: 100vh;
        border-radius: 0;
        box-shadow: none;
      }

      body {
        background: #050509;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="app-title-group">
        <div class="app-title">Bouncing Bubbles</div>
        <div class="app-subtitle">Five bubbles of different sizes, softly colliding with the screen edges.</div>
      </div>
      <div class="legend" aria-hidden="true">
        <span class="legend-dot"></span>
        <span class="legend-dot"></span>
        <span class="legend-dot"></span>
        <span class="legend-dot"></span>
        <span class="legend-dot"></span>
        <span>Boundary collisions only</span>
      </div>
    </header>

    <main class="canvas-wrapper">
      <canvas id="bubbleCanvas"></canvas>
    </main>

    <footer class="footer">
      <span class="pill">
        <span class="pill-dot"></span>
        <span>Animation running at 60fps (best effort)</span>
      </span>
      <span>Resize the window and the bubbles adapt.</span>
    </footer>
  </div>

  <script>
    (function () {
      const canvas = document.getElementById("bubbleCanvas");
      const ctx = canvas.getContext("2d");

      function resizeCanvas() {
        const rect = canvas.parentElement.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      window.addEventListener("resize", resizeCanvas);
      resizeCanvas();

      const colors = [
        getComputedStyle(document.documentElement).getPropertyValue("--bubble-1").trim() || "#4dd0e1",
        getComputedStyle(document.documentElement).getPropertyValue("--bubble-2").trim() || "#ffca28",
        getComputedStyle(document.documentElement).getPropertyValue("--bubble-3").trim() || "#ff7043",
        getComputedStyle(document.documentElement).getPropertyValue("--bubble-4").trim() || "#ab47bc",
        getComputedStyle(document.documentElement).getPropertyValue("--bubble-5").trim() || "#66bb6a"
      ];

      class Bubble {
        constructor(options) {
          this.radius = options.radius;
          this.color = options.color;
          this.maxSpeed = options.maxSpeed || 2;
          this.reset();
        }

        reset() {
          const rect = canvas.getBoundingClientRect();
          this.x = this.radius + Math.random() * (rect.width - this.radius * 2);
          this.y = this.radius + Math.random() * (rect.height - this.radius * 2);
          const speed = 0.75 + Math.random() * (this.maxSpeed - 0.75);
          const angle = Math.random() * Math.PI * 2;
          this.vx = Math.cos(angle) * speed;
          this.vy = Math.sin(angle) * speed;
        }

        update(boundsWidth, boundsHeight) {
          this.x += this.vx;
          this.y += this.vy;

          if (this.x - this.radius <= 0) {
            this.x = this.radius;
            this.vx *= -1;
          } else if (this.x + this.radius >= boundsWidth) {
            this.x = boundsWidth - this.radius;
            this.vx *= -1;
          }

          if (this.y - this.radius <= 0) {
            this.y = this.radius;
            this.vy *= -1;
          } else if (this.y + this.radius >= boundsHeight) {
            this.y = boundsHeight - this.radius;
            this.vy *= -1;
          }
        }

        draw(ctx) {
          const gradient = ctx.createRadialGradient(
            this.x - this.radius * 0.4,
            this.y - this.radius * 0.4,
            this.radius * 0.1,
            this.x,
            this.y,
            this.radius
          );

          gradient.addColorStop(0, "#ffffff");
          gradient.addColorStop(0.15, this.color);
          gradient.addColorStop(0.9, "rgba(5, 5, 9, 0.3)");
          gradient.addColorStop(1, "rgba(5, 5, 9, 0)");

          ctx.save();
          ctx.globalAlpha = 0.9;
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      const bubbles = [
        new Bubble({ radius: 70, color: colors[0], maxSpeed: 1.4 }),
        new Bubble({ radius: 55, color: colors[1], maxSpeed: 1.6 }),
        new Bubble({ radius: 45, color: colors[2], maxSpeed: 1.8 }),
        new Bubble({ radius: 35, color: colors[3], maxSpeed: 2.0 }),
        new Bubble({ radius: 25, color: colors[4], maxSpeed: 2.2 })
      ];

      function animate() {
        const rect = canvas.getBoundingClientRect();
        ctx.clearRect(0, 0, rect.width, rect.height);

        const gradientBg = ctx.createLinearGradient(0, 0, rect.width, rect.height);
        gradientBg.addColorStop(0, "rgba(255, 255, 255, 0.03)");
        gradientBg.addColorStop(1, "rgba(0, 0, 0, 0.4)");
        ctx.fillStyle = gradientBg;
        ctx.fillRect(0, 0, rect.width, rect.height);

        bubbles.forEach((bubble) => {
          bubble.update(rect.width, rect.height);
          bubble.draw(ctx);
        });

        requestAnimationFrame(animate);
      }

      animate();
    })();
  </script>
</body>
</html>
